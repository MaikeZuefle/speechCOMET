speech_regression_metric:
  class_path: speechcomet.models.SpeechRegression
  init_args:
    nr_frozen_epochs: 0.3
    keep_trg_embeddings_frozen: True
    keep_src_embeddings_frozen: True
    optimizer: AdamW
    encoder_learning_rate: 1.0e-06
    learning_rate: 1.5e-05
    layerwise_decay: 0.95
    encoder_model: XLM-RoBERTa
    input_modality: text
    pretrained_model: xlm-roberta-base  # or microsoft/infoxlm-large
    pool: avg
    layer: mix
    layer_transformation: sparsemax
    layer_norm: False
    dropout: 0.1
    batch_size: 2
    train_data:
      - maikezu/iwslt2026-metrics-shared-train-dev  # or zouharvi/wmt-human-all for WMT
    validation_data:
      - maikezu/iwslt2026-metrics-shared-train-dev

trainer: ../../trainer.yaml
early_stopping: ../../early_stopping.yaml
model_checkpoint: ../../model_checkpoint.yaml
